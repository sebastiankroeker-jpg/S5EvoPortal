<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>S5Evo ScopeBoard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b16;
      --card: rgba(13,18,32,0.92);
      --card-alt: rgba(13,18,32,0.75);
      --border: rgba(148,163,184,0.15);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #dc2626;
      --status-ready: #22c55e;
      --status-progress: #f97316;
      --status-review: #38bdf8;
      --status-backlog: #64748b;
      --status-blocked: #f43f5e;
      --status-done: #a855f7;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 10% 10%, rgba(220,38,38,0.18), transparent 55%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: clamp(16px, 4vw, 48px);
    }
    header {
      margin-bottom: 28px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
    }
    p.subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(220px, 1fr);
      gap: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.4);
    }
    .card.small {
      background: var(--card-alt);
      padding: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    thead th {
      text-align: left;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(148,163,184,0.08);
      vertical-align: top;
      font-size: 0.93rem;
    }
    tbody tr.section-row td {
      padding-top: 18px;
      border-bottom: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(148,163,184,0.18);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .chip[data-status="READY"] { background: rgba(34,197,94,0.18); color: var(--status-ready); }
    .chip[data-status="IN_PROGRESS"] { background: rgba(249,115,22,0.18); color: var(--status-progress); }
    .chip[data-status="REVIEW"] { background: rgba(56,189,248,0.18); color: var(--status-review); }
    .chip[data-status="BACKLOG"] { background: rgba(100,116,139,0.18); color: var(--status-backlog); }
    .chip[data-status="BLOCKED"] { background: rgba(244,63,94,0.18); color: var(--status-blocked); }
    .chip[data-status="DONE"] { background: rgba(168,85,247,0.18); color: var(--status-done); }
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .inbox-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
    }
    .inbox-pill .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
    }
    .inbox-pill.active .dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .inbox-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.9rem;
    }
    .inbox-list li {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .empty-msg {
      color: var(--muted);
      font-size: 0.9rem;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .card.small {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏅 S5Evo ScopeBoard</h1>
    <p class="subtitle">Tailnet-only Dashboard · Live-Daten direkt aus diesem Workspace</p>
  </header>
  <div class="grid">
    <section class="card">
      <div class="inbox-header" style="margin-bottom:16px;">
        <h2 style="margin:0;font-size:1.1rem;">Scopes</h2>
        <span id="updated" class="inbox-pill"><span class="dot"></span> lädt…</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Scope</th>
            <th>Status</th>
            <th>Owner</th>
            <th>DoD</th>
          </tr>
        </thead>
        <tbody id="scope-rows"></tbody>
      </table>
    </section>
    <aside class="card small">
      <div class="inbox-header">
        <div>
          <h2 style="margin:0;font-size:1rem;">Inbox</h2>
          <small class="subtitle" style="font-size:0.8rem;">Direktlink: <a href="/INBOX.md" style="color:var(--accent);text-decoration:none;">INBOX.md</a></small>
        </div>
        <a class="inbox-pill" id="inbox-pill" href="/INBOX.md">
          <span class="dot"></span>
          <span id="inbox-count">0</span>
        </a>
      </div>
      <ul class="inbox-list" id="inbox-list"></ul>
      <div class="empty-msg" id="inbox-empty">Keine offenen Items 🎯</div>
    </aside>
  </div>

  <script>
    const statusOrder = ['IN_PROGRESS', 'REVIEW', 'READY', 'BACKLOG', 'DONE', 'BLOCKED'];

    function parseScopes(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const entries = [];
      lines.forEach(line => {
        if (line.startsWith('### ')) {
          entries.push({ type: 'section', label: line.replace('###', '').trim() });
          return;
        }
        const match = line.match(/^(P\d+)\s*\|\s*([^|]+)\|\s*[^|]+\|\s*Owner:([^|]+)\|\s*([^|]+)\|\s*DoD:(.+)$/i);
        if (match) {
          entries.push({
            type: 'scope',
            id: match[1].trim(),
            status: match[2].trim().toUpperCase(),
            owner: match[3].trim(),
            title: match[4].trim(),
            dod: match[5].trim()
          });
        }
      });
      return entries;
    }

    function renderScopes(entries) {
      const tbody = document.getElementById('scope-rows');
      tbody.innerHTML = '';
      entries.forEach(entry => {
        if (entry.type === 'section') {
          const tr = document.createElement('tr');
          tr.className = 'section-row';
          const td = document.createElement('td');
          td.colSpan = 4;
          td.textContent = entry.label;
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        const tr = document.createElement('tr');
        const tdScope = document.createElement('td');
        tdScope.innerHTML = `<strong>${entry.id}</strong><br /><span style="font-size:0.86rem;color:var(--muted);">${entry.title}</span>`;

        const tdStatus = document.createElement('td');
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.dataset.status = entry.status;
        chip.textContent = entry.status.replace('_', ' ');
        tdStatus.appendChild(chip);

        const tdOwner = document.createElement('td');
        tdOwner.textContent = entry.owner;

        const tdDod = document.createElement('td');
        tdDod.textContent = entry.dod;

        tr.append(tdScope, tdStatus, tdOwner, tdDod);
        tbody.appendChild(tr);
      });
    }

    async function loadInbox() {
      const res = await fetch('/INBOX.md?t=' + Date.now());
      const text = await res.text();
      const lines = text.split(/\r?\n/).map(l => l.trim());
      const items = lines.filter(l => l.startsWith('- ') && l.length > 2);
      const list = document.getElementById('inbox-list');
      const empty = document.getElementById('inbox-empty');
      const countEl = document.getElementById('inbox-count');
      const pill = document.getElementById('inbox-pill');

      list.innerHTML = '';
      if (items.length === 0) {
        empty.style.display = 'block';
        pill.classList.remove('active');
        countEl.textContent = '0';
        return;
      }
      empty.style.display = 'none';
      pill.classList.add('active');
      countEl.textContent = items.length;
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item.replace(/^-\s*/, '');
        list.appendChild(li);
      });
    }

    async function init() {
      try {
        const res = await fetch('/SCOPEBOARD.md?t=' + Date.now());
        const text = await res.text();
        const entries = parseScopes(text);
        renderScopes(entries);
        document.getElementById('updated').innerHTML = `<span class="dot" style="background:var(--status-review);"></span>${new Date().toLocaleString('de-DE', {hour12:false})}`;
      } catch (err) {
        document.getElementById('scope-rows').innerHTML = `<tr><td colspan="4">Fehler beim Laden: ${err.message}</td></tr>`;
      }
      loadInbox();
    }

    init();
  </script>
</body>
</html>
