<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <title>S5Evo Portal - offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem 1rem;
      }

      section {
        max-width: 30rem;
        text-align: center;
      }

      .icon {
        align-items: center;
        background: #eef2ff;
        border-radius: 999px;
        color: #4f46e5;
        display: inline-flex;
        height: 4rem;
        justify-content: center;
        margin-bottom: 1.5rem;
        width: 4rem;
      }

      h1 {
        font-size: 1.5rem;
        line-height: 2rem;
        margin: 0;
      }

      p {
        color: #586174;
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0.75rem 0 0;
      }

      a {
        align-items: center;
        background: #4f46e5;
        border-radius: 0.5rem;
        color: #fff;
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 600;
        height: 2.25rem;
        margin-top: 2rem;
        padding: 0 0.9rem;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111827;
          color: #f8fafc;
        }

        .icon {
          background: #312e81;
          color: #fde047;
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="icon" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <path d="M2 2l20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M8.5 16.4a5 5 0 017 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M5 12.9a10 10 0 015.2-2.7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M19 12.9a10 10 0 00-2-1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 20h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <h1>Keine Verbindung</h1>
        <p>
          Das S5Evo Portal braucht fuer aktuelle Anmeldungen, Nachrichten und Admin-Daten eine aktive
          Internetverbindung.
        </p>
        <a href="/">Erneut versuchen</a>
      </section>
    </main>
  </body>
</html>
