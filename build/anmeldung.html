<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaftsanmeldung – S5Evo</title>
    <style>
        body { font-family: system-ui; background: #181818; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .anmeldung-card { background: #242424; border-radius: 1.5rem; padding: 2rem 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 8px 32px 0 #21212188; }
        h2 { margin-top: 0; margin-bottom: 1.1rem; font-size: 2rem; text-align: center; }
        label { display: block; margin-top: 1.6rem; font-weight: 500; }
        input, select { width: 100%; margin-top: 0.3rem; padding: 0.6rem; border-radius: 0.6rem; border: none; font-size: 1.04rem; background: #191919; color: #fff; }
        input[type="checkbox"] { width: unset; }
        .flex-row { display: flex; align-items: center; gap: 0.55rem; margin-top: 1.1rem; }
        .submit-btn { background: #ffda65; color: #151515; font-weight: 700; border: none; border-radius: 0.7rem; padding: 0.75rem 2rem; font-size: 1.1rem; margin-top: 2rem; cursor: pointer; width: 100%; }
        .info { color: #aaa; font-size: 1rem; margin: 0.7rem 0 0.3rem; text-align: center; }
    </style>
</head>
<body>
    <form class="anmeldung-card">
        <h2>Mannschaft anmelden</h2>
        <label>Team-Name
            <input type="text" name="teamname" autocomplete="off" required>
        </label>
        <label>Name Teamchef/Anmelder
            <input type="text" name="teamchef" autocomplete="off" required>
        </label>
        <label for="self_participant" class="flex-row">
            <input type="checkbox" id="self_participant" name="self_participant" checked>
            Ich nehme selbst als Teilnehmer teil
        </label>
        <div id="teilnehmer1fields">
            <label>Geburtsjahr
                <input type="number" name="geburtsjahr1" placeholder="z.B. 2007" min="1900" max="2025" required>
            </label>
            <label>Disziplin
                <select name="disziplin1" required>
                    <option value="">Bitte wählen…</option>
                    <option>Laufen</option>
                    <option>Bankdrücken</option>
                    <option>Stockschießen</option>
                    <option>Rennrad</option>
                    <option>Mountainbike</option>
                </select>
            </label>
        </div>
        <div class="info">Restliche Teilnehmer werden nach dem Absenden abgefragt</div>
        <button type="submit" class="submit-btn">Weiter zur Teilnehmer-Erfassung</button>
        <div class="info" style="margin-top:1.1rem;font-size:0.95rem;">Falls du NUR Teamchef/Admin bist<br> (z.B. für Kinder): Haken einfach rausnehmen.</div>
    </form>
</body>
</html>
